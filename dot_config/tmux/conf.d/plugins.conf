# set -g @sidebar-tree-command 'tree -C -L 3'

## Tmux update display
set -g @plugin 'lljbash/tmux-update-display'

## Floating terminal
# set -g @plugin 'lloydbond/tmux-floating-terminal'
# set -g @floating_scratch_term 'M-i'
# set -g @floating_scratch_to_active_win 'M-h'
# set -g @floating_scratch_to_win 'M-l'
# set -g @floating_active_pane_to_scratch 'M-m'

## Fuzzy finding for tmux commands
#  Requires fzf
set -g @plugin 'sainnhe/tmux-fzf'

## Lazygit in tmux
set -g @plugin 'AngryMorrocoy/tmux-neolazygit'
set -g @open-lazygit 'G'

## Whichkey
# set -g @plugin 'alexwforsythe/tmux-which-key'
# # Disable building YAML config (don't check for yaml)
# set -g @tmux-which-key-disable-autobuild=1
# # Set keybind (default: Space)
# bind-key -T prefix Space display-message "Windows menu"

## Enable logging session
#  Keys:
#    - C-b P = Toggle logging for current pane
#    - C-b Alt+p = Save visible text in pane to a file
#    - C-b Alt+P = Save all scrollback to a file
#    - C-b Alt+c = Clear current pane's history
set -g @plugin 'tmux-plugins/tmux-logging'

## Better mouse mode
set -g @plugin 'nhdaly/tmux-better-mouse-mode'

## Matryoshka (nested sessions)
set -g @plugin 'niqodea/tmux-matryoshka'
