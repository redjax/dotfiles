#!/bin/bash

THIS_DIR=$( cd -- "$( dirname -- "${BASH_SOURCE[0]}" )" &> /dev/null && pwd )

CHEZMOIDATA_SRC="$HOME/.local/share/chezmoi/.chezmoidata.yml"
CHEZMOIDATA_DEST="$HOME/.local/share/chezmoi/.chezmoidata.local.yml"
CHEZMOI_STAGE_DIR="$HOME/.chezmoi_staging"

if [ -f "$CHEZMOIDATA_SRC" ]; then
    if [ ! -f "$CHEZMOIDATA_DEST" ]; then
        cp "$CHEZMOIDATA_SRC" "$CHEZMOIDATA_DEST"
        echo "Copied $CHEZMOIDATA_SRC to $CHEZMOIDATA_DEST"
    fi
fi

rm -r $CHEZMOI_STAGE_DIR
